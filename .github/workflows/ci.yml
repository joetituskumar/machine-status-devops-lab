jobs:
  build-test:
    runs-on: ubuntu-latest
    # This forces every 'run' step below to execute inside the subfolder
    defaults:
      run:
        working-directory: ./machine-status-api

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Now you can keep your original, clean commands!
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Basic syntax check
        run: |
          python -m py_compile app.py

      - name: Build Docker image
        run: |
          docker build -t machine-status-api:${{ github.sha }} .
