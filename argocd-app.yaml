apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: machine-status-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/joetituskumar/machine-status-devops-lab.git
    targetRevision: main
    path: machine-status-chart
  destination:
    server: https://kubernetes.default.svc
    namespace: manufacturing
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
