name: Build and Test Machine API

on:
  push:
    branches: [ "main" ]
  pull_request:

# Gives the runner permission to save packages to GHCR
permissions:
  contents: read
  packages: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./machine-status-api

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Basic syntax check
        run: |
          python -m py_compile app.py

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        run: |
          # Convert username to lowercase to ensure Docker registry compatibility
          USER_LOWER=$(echo "${{ github.actor }}" | tr '[:upper:]' '[:lower:]')
          
          docker build -t ghcr.io/$USER_LOWER/machine-status-api:${{ github.sha }} .
          docker push ghcr.io/$USER_LOWER/machine-status-api:${{ github.sha }}
